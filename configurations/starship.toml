# ~/.config/starship.toml

# Explicit left-side prompt. Only the modules I actually use are
# listed, in a fixed order. New starship versions can't shuffle
# things and modules not in this list are not evaluated at all.
# To add a module: insert it here AND configure its [section] below.
format = """\
$username\
$hostname\
$directory\
$git_branch\
$git_state\
$git_status\
$nodejs\
$rust\
$python\
$java\
$docker_context\
$aws\
$gcloud\
$azure\
$direnv\
$battery\
$line_break\
$character"""

# Right-side prompt: time and command-duration live here so they
# don't push the typing line further down on each invocation.
right_format = "$cmd_duration $time"

# Prompt character configuration
[character]
success_symbol = "[‚ûú](bold green)"
error_symbol = "[‚úó](bold red)"
#vicmd_symbol = "[V](bold yellow)"

# Directory module
[directory]
truncation_length = 3
truncate_to_repo = true
style = "cyan"
read_only = " ÔÝΩ"
read_only_style = "red"

# Git branch
[git_branch]
symbol = "ÓÇÝ "
style = "purple"

# Git status ‚Äî uses a single glyph aesthetic (no emoji) for visual consistency
# and so the prompt renders correctly even on machines without nerd fonts.
[git_status]
style = "bold yellow"
conflicted = "[=](bold red)"
ahead = "‚á°${count}"
behind = "‚á£${count}"
diverged = "‚áï"
untracked = "?"
stashed = "\\$"
modified = "‚úé"
staged = "+${count}"
deleted = "‚úò"
renamed = "¬ª"

# Git state ‚Äî visible during in-progress operations like rebase, merge,
# cherry-pick, bisect. Saves you from forgetting you're mid-rebase.
[git_state]
format = '\([$state( $progress_current/$progress_total)]($style)\) '
style = "bold yellow"
rebase = "REBASING"
merge = "MERGING"
revert = "REVERTING"
cherry_pick = "[üçí PICKING](bold red)"
bisect = "BISECTING"
am = "AM"
am_or_rebase = "AM/REBASE"


# Java ‚Äî keep enabled (sdkman + spring-boot-spikes + pneuma all use it).
# Removed detect_folders = ["src"] because it would fire \`java -version\`
# inside any project with a src/ subdir (React, Rust, Python, Go, etc.).
# Removed clj/cljs/cljc from detect_extensions ‚Äî not using Clojure.
[java]
symbol = "‚òï "
style = "red bold"
format = "via [$symbol$version ($vendor)]($style) "
detect_extensions = ["java", "class", "jar", "gradle"]
detect_files = [
    "pom.xml",
    "build.gradle",
    "build.gradle.kts",
    "settings.gradle",
    "settings.gradle.kts",
]

# Node.js
[nodejs]
symbol = "‚¨¢ "
style = "green"

# Rust
[rust]
symbol = "ü¶Ä "
style = "red"

# Python
[python]
symbol = "üêç "
style = "yellow"

# Docker
[docker_context]
symbol = "üê≥ "
style = "blue bold"

# Kubernetes ‚Äî disabled by default for performance.
# The module shells out to read kubeconfig on every prompt render,
# adding 30-80ms even when no context is active. Re-enable
# (disabled = false) when you actively need to see the current
# context, or scope it with detect_files for k8s project dirs.
[kubernetes]
symbol = "‚éà "
style = "cyan bold"
disabled = true

# Time ‚Äî currently rendered on the left prompt. Move to right_format
# (dotfiles-a2z) to get it out of the way of the typing line.
[time]
disabled = false
format = "[$time]($style) "
time_format = "%T"
style = "dimmed white"

# AWS ‚Äî show the active profile (and region) before destructive commands.
[aws]
symbol = "aws "
style = "bold #FF9900"
format = 'on [$symbol$profile(\($region\)) ]($style)'
disabled = false
expiration_symbol = "üîí "

[aws.region_aliases]
us-east-1 = "va"
us-east-2 = "oh"
us-west-1 = "nca"
us-west-2 = "or"
eu-west-1 = "ie"
eu-central-1 = "fr"

# Google Cloud ‚Äî show the active account/project.
[gcloud]
symbol = "gcp "
style = "bold blue"
format = 'on [$symbol$account(@$domain)(\($region\)) ]($style)'
disabled = false

# Azure ‚Äî show the active subscription.
[azure]
symbol = "az "
style = "bold #0078D4"
format = 'on [$symbol($subscription) ]($style)'
disabled = false

# direnv ‚Äî show when an .envrc has loaded into the current shell.
# Helpful reminder that environment variables have been mutated by
# something other than your shell config.
[direnv]
disabled = true
symbol = "üìÇ "
style = "bold orange"
format = "[$symbol$loaded/$allowed]($style) "

# Battery
[battery]
full_symbol = "üîã"
charging_symbol = "‚ö°Ô∏è"
discharging_symbol = "üîå"

[[battery.display]]
threshold = 20
style = "bold red"

# Command duration
[cmd_duration]
min_time = 500
format = "took [$duration](bold yellow)"

# Line break between prompt sections
[line_break]
disabled = false

# Right prompt (only works in some shells like zsh)
#[right_format] = "$time"
