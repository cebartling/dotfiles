# ~/.config/starship.toml

# Prompt character configuration
[character]
success_symbol = "[тЮЬ](bold green)"
error_symbol = "[тЬЧ](bold red)"
#vicmd_symbol = "[V](bold yellow)"

# Directory module
[directory]
truncation_length = 3
truncate_to_repo = true
style = "cyan"
read_only = " яа╜"
read_only_style = "red"

# Git branch
[git_branch]
symbol = "юВа "
style = "purple"

# Git status
[git_status]
style = "bold yellow"
conflicted = "тЪФя╕П "
ahead = "тЗб${count}"
behind = "тЗг${count}"
diverged = "тЗХ"
untracked = "??"
stashed = "ЁЯУж"
modified = "тЬО"
staged = "+${count}"
deleted = "тЬШ"
renamed = "┬╗"


[java]
symbol = "тШХ "
style = "red bold"
format = "via [$symbol$version ($vendor)]($style) "
detect_extensions = ["java", "class", "jar", "gradle", "clj", "cljs", "cljc"]
detect_files = [
    "pom.xml",
    "build.gradle",
    "build.gradle.kts",
    "settings.gradle",
    "settings.gradle.kts",
]
detect_folders = ["src"]

# Node.js
[nodejs]
symbol = "тмв "
style = "green"

# Rust
[rust]
symbol = "ЁЯжА "
style = "red"

# Python
[python]
symbol = "ЁЯРН "
style = "yellow"
pyenv_version_name = true

# Docker
[docker_context]
symbol = "ЁЯР│ "
style = "blue bold"

# Kubernetes тАФ disabled by default for performance.
# The module shells out to read kubeconfig on every prompt render,
# adding 30-80ms even when no context is active. Re-enable
# (disabled = false) when you actively need to see the current
# context, or scope it with detect_files for k8s project dirs.
[kubernetes]
symbol = "тОИ "
style = "cyan bold"
disabled = true

# Time
# [time]
# disabled = false
# format = "ЁЯХТ [%T] "
# style = "dimmed white"

# AWS тАФ show the active profile (and region) before destructive commands.
[aws]
symbol = "aws "
style = "bold #FF9900"
format = 'on [$symbol$profile(\($region\)) ]($style)'
disabled = false
expiration_symbol = "ЁЯФТ "

[aws.region_aliases]
us-east-1 = "va"
us-east-2 = "oh"
us-west-1 = "nca"
us-west-2 = "or"
eu-west-1 = "ie"
eu-central-1 = "fr"

# Google Cloud тАФ show the active account/project.
[gcloud]
symbol = "gcp "
style = "bold blue"
format = 'on [$symbol$account(@$domain)(\($region\)) ]($style)'
disabled = false

# direnv тАФ show when an .envrc has loaded into the current shell.
# Helpful reminder that environment variables have been mutated by
# something other than your shell config.
[direnv]
disabled = false
symbol = "ЁЯУВ "
style = "bold orange"
format = "[$symbol$loaded/$allowed]($style) "

# Battery
[battery]
full_symbol = "ЁЯФЛ"
charging_symbol = "тЪбя╕П"
discharging_symbol = "ЁЯФМ"

[[battery.display]]
threshold = 20
style = "bold red"

# Command duration
[cmd_duration]
min_time = 500
format = "took [$duration](bold yellow)"

# Line break between prompt sections
[line_break]
disabled = false

# Right prompt (only works in some shells like zsh)
#[right_format] = "$time"
